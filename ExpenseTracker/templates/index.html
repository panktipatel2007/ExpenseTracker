<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">₹ Personal Expense Tracker</h2>

    <!-- Summary Card -->
    <div class="card text-white bg-primary mb-4 shadow">
        <div class="card-body">
            <h4 class="card-title">Total Spending: ₹{{ "%.2f"|format(total_spent) }}</h4>
        </div>
    </div>

    <!-- Form to Add Expense -->
    <div class="card p-4 shadow-sm mb-4">
        <form action="/add" method="POST" class="row g-3">
            <div class="col-md-4">
                <input type="text" name="title" class="form-control" placeholder="What did you buy?" required>
            </div>
            <div class="col-md-3">
                <input type="number" step="0.01" name="amount" class="form-control" placeholder="Amount (₹)" required>
            </div>
            <div class="col-md-3">
                <select name="category" class="form-select">
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Bills">Bills</option>
                    <option value="Entertainment">Entertainment</option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-success w-100">Add</button>
            </div>
        </form>
    </div>

    <!-- Expense Table -->
    <div class="table-responsive bg-white p-3 shadow-sm rounded">
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Date</th>
                    <th>Item</th>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for expense in expenses %}
                <tr>
                    <td>{{ expense.date_added.strftime('%Y-%m-%d') }}</td>
                    <td>{{ expense.title }}</td>
                    <td><span class="badge bg-info text-dark">{{ expense.category }}</span></td>
                    <td class="fw-bold text-danger">₹{{ "%.2f"|format(expense.amount) }}</td>
                    <td>
                        <a href="/delete/{{ expense.id }}" class="btn btn-sm btn-outline-danger">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
